<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florence Care 24 LTD - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #004A87 0%, #00BCD4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            margin-bottom: 40px;
        }

        .logo img {
            height: 70px;
            width: auto;
            border-radius: 8px;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 25px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 42px;
            margin-bottom: 15px;
            font-weight: 700;
            color: #004A87;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 16px;
            color: #00BCD4;
            margin-bottom: 30px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 18px;
            line-height: 1.8;
            color: #555;
            margin-bottom: 10px;
        }

        .message {
            font-size: 16px;
            color: #666;
            margin-top: 25px;
            line-height: 1.7;
        }

        .contact-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }

        .contact-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .contact-info {
            font-size: 16px;
            color: #004A87;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 28px;
                margin-bottom: 10px;
            }

            p {
                font-size: 16px;
            }

            .icon {
                font-size: 45px;
            }

            .contact-section {
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <span class="icon">🚀</span>
        <h1>Florence Care 24 LTD</h1>
        <div class="subtitle">Coming Soon</div>
        <p>We're currently enhancing our digital presence to better serve you.</p>
        <div class="message">
            Our new website is under construction and will be launching shortly with improved features and services.
        </div>
    </div>
</body>
</html>
